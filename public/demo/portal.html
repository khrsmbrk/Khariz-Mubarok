<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Pasien - RSUMLA</title>
    <link rel="stylesheet" href="portal.css">
</head>
<body>
    <header class="portal-header">
        <div class="container flex-between">
            <div class="logo-area">
                <div class="logo-icon">RS</div>
                <h2>Portal Pasien RSUMLA</h2>
            </div>
            <a href="index.html" class="btn-back">Kembali ke Beranda</a>
        </div>
    </header>

    <main class="container">
        <!-- Login Section -->
        <section id="loginSection" class="auth-card">
            <div class="auth-header">
                <h3>Masuk ke Portal Pasien</h3>
                <p>Silakan masukkan NIK atau No. Rekam Medis dan Tanggal Lahir Anda.</p>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="patientId">NIK / No. Rekam Medis</label>
                    <input type="text" id="patientId" placeholder="Contoh: 3524xxxxxxxxxxxx atau RM123456" required>
                    <span class="error-msg" id="idError"></span>
                </div>
                <div class="form-group">
                    <label for="dob">Tanggal Lahir</label>
                    <input type="date" id="dob" required>
                    <span class="error-msg" id="dobError"></span>
                </div>
                <button type="submit" class="btn-submit">Masuk</button>
            </form>
        </section>

        <!-- Dashboard Section (Hidden by default) -->
        <section id="dashboardSection" class="dashboard-card hidden">
            <div class="dashboard-header flex-between">
                <div>
                    <h3>Selamat Datang, <span id="patientNameDisplay"></span></h3>
                    <p>No. RM: <strong id="patientRmDisplay"></strong></p>
                </div>
                <button id="btnLogout" class="btn-outline">Keluar</button>
            </div>

            <div class="dashboard-actions">
                <button class="action-card primary">
                    <span class="icon">📝</span>
                    <h4>Daftar Berobat Online</h4>
                </button>
                <button class="action-card">
                    <span class="icon">🔬</span>
                    <h4>Lihat Hasil Penunjang</h4>
                </button>
                <button class="action-card">
                    <span class="icon">📄</span>
                    <h4>Unduh Ringkasan Rekam Medis</h4>
                </button>
            </div>

            <div class="history-section">
                <h4>Riwayat Kunjungan Terakhir</h4>
                <div class="table-responsive">
                    <table class="history-table">
                        <thead>
                            <tr>
                                <th>Tanggal</th>
                                <th>Poliklinik</th>
                                <th>Dokter</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="historyTableBody">
                            <!-- Injected via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script src="portal.js"></script>
</body>
</html>
